<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aviutl-whisper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎙️ aviutl-whisper</h1>
            <p class="subtitle">音声文字起こし＋話者分離ツール</p>
        </header>

        <section class="card" id="file-section">
            <h2>📁 入力ファイル</h2>
            <div class="file-select">
                <button id="btn-select-file" class="btn btn-primary">ファイルを選択</button>
                <span id="file-name" class="file-label">ファイルが選択されていません</span>
            </div>
            <div id="file-info" class="file-info hidden"></div>
        </section>

        <section class="card" id="settings-section">
            <h2>⚙️ 設定</h2>
            <div class="settings-grid">
                <div class="setting-item">
                    <label for="model-size">Whisperモデル</label>
                    <select id="model-size">
                        <option value="tiny">tiny (~75 MB) - 最速・低精度</option>
                        <option value="base">base (~140 MB) - 高速</option>
                        <option value="small">small (~460 MB) - バランス</option>
                        <option value="medium" selected>medium (~1.5 GB) - 推奨</option>
                        <option value="large-v3">large-v3 (~3 GB) - 最高精度</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label for="language">言語</label>
                    <select id="language">
                        <option value="">自動検出</option>
                        <option value="ja" selected>日本語</option>
                        <option value="en">英語</option>
                        <option value="zh">中国語</option>
                        <option value="ko">韓国語</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label for="num-speakers">話者数</label>
                    <select id="num-speakers">
                        <option value="auto" selected>自動推定</option>
                        <option value="1">1人</option>
                        <option value="2">2人</option>
                        <option value="3">3人</option>
                        <option value="4">4人</option>
                        <option value="5">5人</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label for="output-format">出力形式</label>
                    <select id="output-format">
                        <option value="text" selected>テキスト (.txt)</option>
                        <option value="srt">SRT字幕 (.srt)</option>
                        <option value="csv">CSV (.csv)</option>
                        <option value="tsv">TSV (.tsv)</option>
                        <option value="exo">AviUtl exo (.exo)</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label for="diarization-method">話者分離方式</label>
                    <select id="diarization-method">
                        <option value="speechbrain" selected>speechbrain (内蔵)</option>
                        <option value="pyannote">pyannote (高精度)</option>
                    </select>
                </div>
                <div class="setting-item" id="hf-token-item" style="display: none;">
                    <label for="hf-token">HuggingFace トークン</label>
                    <input type="password" id="hf-token" placeholder="hf_xxxxxxxxxxxx">
                    <small class="hf-token-hint">
                        <a href="#" id="hf-token-link" title="HuggingFaceでトークンを取得">トークンの取得方法</a>
                    </small>
                </div>
            </div>
        </section>

        <section class="card hidden" id="exo-settings-section">
            <h2>🎬 exo詳細設定</h2>
            <div class="settings-grid">
                <div class="setting-item">
                    <label for="exo-font">フォント</label>
                    <select id="exo-font">
                        <option value="MS UI Gothic">MS UI Gothic</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label for="exo-font-size">フォントサイズ</label>
                    <input type="number" id="exo-font-size" value="34" min="1" max="200">
                </div>
                <div class="setting-item">
                    <label for="exo-spacing-x">字間</label>
                    <input type="number" id="exo-spacing-x" value="0" min="-100" max="100">
                </div>
                <div class="setting-item">
                    <label for="exo-spacing-y">行間</label>
                    <input type="number" id="exo-spacing-y" value="0" min="-100" max="100">
                </div>
                <div class="setting-item">
                    <label for="exo-display-speed">表示速度</label>
                    <input type="number" id="exo-display-speed" value="0" min="0" max="100" step="0.1">
                </div>
                <div class="setting-item">
                    <label for="exo-align">寄せ方向</label>
                    <select id="exo-align">
                        <option value="0">左上</option>
                        <option value="1">上中央</option>
                        <option value="2">右上</option>
                        <option value="3">左中</option>
                        <option value="4" selected>中央</option>
                        <option value="5">右中</option>
                        <option value="6">左下</option>
                        <option value="7">下中央</option>
                        <option value="8">右下</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label for="exo-pos-x">X位置</label>
                    <input type="number" id="exo-pos-x" value="0" step="0.1">
                </div>
                <div class="setting-item">
                    <label for="exo-pos-y">Y位置</label>
                    <input type="number" id="exo-pos-y" value="0" step="0.1">
                </div>
                <div class="setting-item">
                    <label for="exo-max-chars">1行の最大文字数</label>
                    <input type="number" id="exo-max-chars" value="20" min="0" max="200">
                </div>
            </div>
            <div class="settings-row" style="margin-top: 12px;">
                <label class="checkbox-label">
                    <input type="checkbox" id="exo-bold"> 太字
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="exo-italic"> 斜体
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="exo-soft-edge" checked> 縁取り（ソフトエッジ）
                </label>
            </div>
            <div class="background-image-area" style="margin-top: 16px;">
                <h3>🏞️ 背景画像</h3>
                <div class="bg-image-row">
                    <button id="btn-bg-image" class="btn btn-tachie-select">画像選択</button>
                    <span id="bg-image-name" class="tachie-file-name">未選択</span>
                    <button id="btn-bg-image-clear" class="btn-tachie-clear" title="クリア">✕</button>
                </div>
            </div>
            <div class="speaker-colors-area" id="speaker-colors-area" style="margin-top: 16px;">
                <h3>🎨 話者ごとの色設定</h3>
                <div id="speaker-colors-list"></div>
            </div>
            <div class="speaker-tachie-area" id="speaker-tachie-area" style="margin-top: 16px;">
                <h3>🖼️ 話者ごとの立ち絵設定</h3>
                <p class="tachie-description">話者が話している間はカラー、話していない間はモノクロで表示されます</p>
                <div id="speaker-tachie-list"></div>
            </div>
        </section>

        <section class="card" id="action-section">
            <div class="action-row">
                <button id="btn-start" class="btn btn-accent" disabled>▶ 文字起こし開始</button>
                <button id="btn-cancel" class="btn btn-danger hidden">⏹ キャンセル</button>
            </div>
            <div id="progress-area" class="hidden">
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
                <p id="progress-text" class="progress-text">準備中...</p>
            </div>
        </section>

        <section class="card hidden" id="result-section">
            <h2>📝 結果プレビュー</h2>
            <div class="result-stats" id="result-stats"></div>
            <div id="speaker-mapping-area" class="speaker-mapping-area hidden">
                <h3>🗣️ 話者の確認</h3>
                <p class="mapping-description">サンプル音声を再生して話者を確認し、設定スロットを割り当てできます</p>
                <div id="speaker-mapping-list"></div>
                <button id="btn-swap-speakers" class="btn btn-swap hidden">🔄 話者を入れ替え</button>
            </div>
            <div id="exo-preview-area" class="exo-preview-area hidden">
                <h3>🖥️ シーンプレビュー</h3>
                <div class="preview-container">
                    <canvas id="preview-canvas" width="1920" height="1080"></canvas>
                </div>
                <div class="preview-nav">
                    <button id="btn-prev-seg" class="btn btn-nav" title="前のセグメント">◀</button>
                    <span id="preview-seg-info" class="preview-seg-info">- / -</span>
                    <button id="btn-next-seg" class="btn btn-nav" title="次のセグメント">▶</button>
                </div>
                <div id="preview-seg-detail" class="preview-seg-detail"></div>
                <!-- セグメント編集パネル -->
                <div id="seg-editor" class="seg-editor hidden">
                    <div class="seg-editor-row">
                        <div class="seg-editor-field">
                            <label>話者</label>
                            <select id="seg-edit-speaker" class="seg-edit-input"></select>
                        </div>
                        <div class="seg-editor-field seg-editor-time">
                            <label>開始</label>
                            <input type="number" id="seg-edit-start" class="seg-edit-input" step="0.1" min="0">
                        </div>
                        <div class="seg-editor-field seg-editor-time">
                            <label>終了</label>
                            <input type="number" id="seg-edit-end" class="seg-edit-input" step="0.1" min="0">
                        </div>
                    </div>
                    <div class="seg-editor-row">
                        <div class="seg-editor-field seg-editor-text-field">
                            <label>テキスト</label>
                            <textarea id="seg-edit-text" class="seg-edit-input seg-edit-textarea" rows="2"></textarea>
                        </div>
                    </div>
                    <div class="seg-editor-actions">
                        <button id="btn-seg-apply" class="btn btn-small btn-primary" title="変更を適用">✔ 適用</button>
                        <button id="btn-seg-add" class="btn btn-small" title="新しいセグメントを追加">＋ 追加</button>
                        <button id="btn-seg-delete" class="btn btn-small btn-danger" title="このセグメントを削除">🗑 削除</button>
                    </div>
                </div>
            </div>
            <div class="result-preview">
                <textarea id="result-text" readonly></textarea>
            </div>
            <div class="action-row">
                <button id="btn-save" class="btn btn-primary">💾 ファイルに保存</button>
                <button id="btn-copy" class="btn">📋 コピー</button>
            </div>
        </section>

        <footer>
            <div id="device-info" class="device-info"></div>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
